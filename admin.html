<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员面板 - Mark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 密码验证界面 */
        .auth-panel {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .auth-panel h1 {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .auth-panel p {
            color: #999;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .auth-panel input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
        }

        .auth-panel input:focus {
            border-color: #667eea;
        }

        .auth-panel .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .auth-panel .btn:hover {
            opacity: 0.9;
        }

        .auth-panel .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
        }

        /* 管理主界面 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
        }

        .container.hidden, .auth-panel.hidden {
            display: none;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        header .toolbar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .toolbar .btn-sm {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .toolbar .btn-sm:hover {
            background: rgba(255,255,255,0.2);
        }

        .toolbar .btn-sm.danger {
            border-color: rgba(231,76,60,0.5);
            color: #e74c3c;
        }

        .toolbar .btn-sm.danger:hover {
            background: rgba(231,76,60,0.15);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: white;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            opacity: 0.8;
            margin-top: 5px;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .table-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 {
            font-size: 1.1rem;
            margin: 0;
        }

        .table-header .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .refresh-btn {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .select-all-label {
            color: white;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .select-all-label input {
            margin-right: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e8e8e8;
            font-size: 14px;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            margin-left: 4px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .reset-pwd-btn {
            background: #17a2b8;
            color: white;
        }

        .reset-pwd-btn:hover {
            background: #138496;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
            }

            .auth-panel {
                max-width: 100%;
                border-radius: 0;
                padding: 32px 20px;
                min-height: 100vh;
            }

            .container {
                padding: 20px 12px;
            }

            header h1 {
                font-size: 1.6rem;
            }

            header .toolbar {
                flex-wrap: wrap;
                gap: 8px;
            }

            .toolbar .btn-sm {
                font-size: 12px;
                padding: 6px 12px;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .stat-card {
                padding: 14px 10px;
            }

            .stat-card .number {
                font-size: 1.8rem;
            }

            .table-header {
                padding: 12px 14px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .table-header h2 {
                font-size: 0.95rem;
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 480px;
            }

            th, td {
                padding: 8px 10px;
                font-size: 12px;
                white-space: nowrap;
            }

            .action-btn {
                padding: 4px 8px;
                font-size: 11px;
            }

            .table-container > div[style*="padding"] {
                flex-wrap: wrap;
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }

        /* 搜索引擎管理 */
        .engine-icon-preview {
            width: 28px; height: 28px;
            border-radius: 6px; object-fit: cover; vertical-align: middle;
        }
        .engine-color-dot {
            display: inline-block; width: 14px; height: 14px;
            border-radius: 50%; vertical-align: middle; margin-right: 6px;
            border: 1px solid rgba(0,0,0,.1);
        }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 200; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; border-radius: 12px; padding: 28px 32px;
            width: 90%; max-width: 420px;
        }
        .modal-box h3 { margin-bottom: 18px; color: #333; font-size: 1rem; }
        .modal-box label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 12px; }
        .modal-box input[type="text"] {
            width: 100%; padding: 8px 12px;
            border: 1px solid #e0e0e0; border-radius: 6px;
            font-size: 14px; outline: none; box-sizing: border-box;
        }
        .modal-box input[type="color"] {
            width: 100%; height: 36px; padding: 2px 4px; cursor: pointer;
            border: 1px solid #e0e0e0; border-radius: 6px; box-sizing: border-box;
        }
        .modal-box input:focus { border-color: #667eea; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions button { padding: 8px 18px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; }
        .btn-cancel { background: #f5f5f5; color: #555; border: 1px solid #e0e0e0 !important; }
        .btn-confirm { background: #667eea; color: white; }
        .btn-confirm:hover { background: #5a6fd6; }
        .engine-icon-cell { display: flex; align-items: center; gap: 8px; }
        .edit-engine-btn { background: #17a2b8; color: white; }
        .edit-engine-btn:hover { background: #138496; }
        .toggle-visible-btn { background: #28a745; color: white; font-size: 12px; }
        .toggle-visible-btn:hover { background: #218838; }
        .toggle-hidden-btn { background: #6c757d; color: white; font-size: 12px; }
        .toggle-hidden-btn:hover { background: #5a6268; }

        /* 拖拽排序 */
        .drag-handle {
            cursor: grab; color: #bbb; font-size: 16px; padding: 0 4px;
            user-select: none; line-height: 1;
        }
        .drag-handle:active { cursor: grabbing; }
        tr.dragging { opacity: 0.4; }
        tr.drag-over { background: #f0f4ff !important; }
        .badge-builtin {
            display: inline-block; font-size: 10px; padding: 1px 5px;
            background: #e8f4fd; color: #1a7abf; border-radius: 3px;
            vertical-align: middle; margin-left: 4px;
        }
    </style>
<body>
    <!-- 密码验证界面 -->
    <div id="authPanel" class="auth-panel">
        <h1>Mark</h1>
        <p>管理员登录</p>
        <input type="password" id="adminPassword" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')verifyAdmin()">
        <button class="btn" onclick="verifyAdmin()">进入管理面板</button>
        <div id="authError" class="error"></div>
        <a href="/" style="display:inline-block;margin-top:16px;color:#999;font-size:13px;text-decoration:none;">返回首页</a>
    </div>

    <!-- 管理主界面 -->
    <div id="adminContainer" class="container hidden">
        <header>
            <h1>管理员面板</h1>
            <div class="toolbar">
                <button class="btn-sm" onclick="showChangePasswordModal()">修改管理员密码</button>
                <button class="btn-sm danger" onclick="batchDelete()">批量删除选中</button>
                <button class="btn-sm" onclick="location.href='/'">返回首页</button>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="userCount">0</div>
                <div class="label">用户总数</div>
            </div>
            <div class="stat-card" id="regLimitCard">
                <div class="number"><span id="regTodayCount">0</span>/<span id="regLimit">10</span></div>
                <div class="label">今日注册 / 限额</div>
            </div>
        </div>

        <div class="table-container" style="margin-bottom:20px;">
            <div class="table-header">
                <h2>注册限额设置</h2>
            </div>
            <div style="padding:16px 20px;display:flex;align-items:center;gap:12px;">
                <span style="color:#555;font-size:14px;">每日注册限额：</span>
                <input type="number" id="regLimitInput" min="0" value="10" style="width:80px;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;text-align:center;">
                <span style="color:#888;font-size:12px;">（0 = 禁止注册）</span>
                <button class="action-btn" style="background:#667eea;color:white;padding:8px 16px;font-size:13px;" onclick="updateRegLimit()">保存</button>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>用户列表</h2>
                <div class="header-actions">
                    <label class="select-all-label">
                        <input type="checkbox" id="selectAll" onclick="toggleSelectAll()"> 全选
                    </label>
                    <button class="refresh-btn" onclick="loadUsers()">刷新</button>
                </div>
            </div>
            <div id="usersContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="table-container" style="margin-top:20px;">
            <div class="table-header">
                <h2>短链接管理</h2>
                <div class="header-actions">
                    <button class="action-btn delete-btn" onclick="batchDeleteShares()" id="batchDeleteSharesBtn" style="display:none;">批量删除</button>
                    <button class="refresh-btn" onclick="loadShares()">刷新</button>
                </div>
            </div>
            <div id="sharesContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 搜索引擎管理 -->
        <div class="table-container" style="margin-top:20px;">
            <div class="table-header">
                <h2>全局搜索引擎管理</h2>
                <div class="header-actions">
                    <button class="refresh-btn" onclick="openEngineModal()">+ 添加引擎</button>
                    <button class="refresh-btn" onclick="loadGlobalEngines()">刷新</button>
                </div>
            </div>
            <div id="enginesContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 修改管理员密码模态框 -->
    <div id="changePwdModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;">
        <div style="background:white;border-radius:12px;padding:32px;width:90%;max-width:360px;">
            <h3 style="margin-bottom:20px;color:#333;">修改管理员密码</h3>
            <input type="password" id="oldAdminPwd" placeholder="原密码" style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;margin-bottom:12px;outline:none;">
            <input type="password" id="newAdminPwd" placeholder="新密码" style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;margin-bottom:16px;outline:none;">
            <div style="display:flex;gap:8px;justify-content:flex-end;">
                <button onclick="document.getElementById('changePwdModal').style.display='none'" style="padding:8px 16px;border:1px solid #e0e0e0;border-radius:6px;background:white;cursor:pointer;font-size:14px;">取消</button>
                <button onclick="changeAdminPassword()" style="padding:8px 16px;border:none;border-radius:6px;background:#667eea;color:white;cursor:pointer;font-size:14px;">确认修改</button>
            </div>
        </div>
    </div>

    <!-- 搜索引擎添加/编辑模态框 -->
    <div id="engineModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="engineModalTitle">添加搜索引擎</h3>
            <input type="hidden" id="engineEditId">
            <label>引擎名称 *</label>
            <input type="text" id="engineName" placeholder="例：谷歌">
            <label>搜索地址 * <span style="color:#999;font-size:12px;">（用 {q} 代替关键词）</span></label>
            <input type="text" id="engineUrl" placeholder="例：https://www.google.com/search?q={q}">
            <label>主题色</label>
            <input type="color" id="engineColor" value="#667eea">
            <label style="margin-top:12px;display:flex;align-items:center;gap:8px;">
                图标预览
                <img id="engineIconPreview" class="engine-icon-preview" src="" alt="" style="display:none;">
                <span id="engineIconFallback" style="display:none;width:28px;height:28px;border-radius:6px;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#555;"></span>
            </label>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEngineModal()">取消</button>
                <button class="btn-confirm" onclick="saveEngine()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let selectedUserIds = new Set();
        let adminPwd = ''; // 登录后缓存，供全局引擎 API 使用

        // 管理员密码验证
        async function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('authError');
            try {
                const res = await fetch('/api/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (data.success) {
                    adminPwd = password;
                    document.getElementById('authPanel').classList.add('hidden');
                    document.getElementById('adminContainer').classList.remove('hidden');
                    document.body.style.alignItems = 'flex-start';
                    loadUsers();
                    loadRegLimit();
                    loadShares();
                    loadGlobalEngines();
                } else {
                    errorEl.textContent = data.error || '密码错误';
                }
            } catch (err) {
                errorEl.textContent = '网络错误';
            }
        }

        // 修改管理员密码
        function showChangePasswordModal() {
            document.getElementById('changePwdModal').style.display = 'flex';
            document.getElementById('oldAdminPwd').value = '';
            document.getElementById('newAdminPwd').value = '';
        }

        async function changeAdminPassword() {
            const oldPassword = document.getElementById('oldAdminPwd').value;
            const newPassword = document.getElementById('newAdminPwd').value;
            if (!oldPassword || !newPassword) {
                alert('请填写完整');
                return;
            }
            try {
                const res = await fetch('/api/admin/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                const data = await res.json();
                if (data.success) {
                    alert('密码修改成功');
                    document.getElementById('changePwdModal').style.display = 'none';
                } else {
                    alert(data.error || '修改失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        // 点击模态框外部关闭
        document.getElementById('changePwdModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        });

        // 全选/取消全选
        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            const checkboxes = document.querySelectorAll('.user-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = checked;
                if (checked) {
                    selectedUserIds.add(cb.value);
                } else {
                    selectedUserIds.delete(cb.value);
                }
            });
        }

        function toggleUser(id, checked) {
            if (checked) {
                selectedUserIds.add(id);
            } else {
                selectedUserIds.delete(id);
            }
            document.getElementById('selectAll').checked = false;
        }

        // 批量删除
        async function batchDelete() {
            if (selectedUserIds.size === 0) {
                alert('请先选择要删除的用户');
                return;
            }
            if (!confirm(`确定要删除选中的 ${selectedUserIds.size} 个用户吗？此操作无法撤销。`)) {
                return;
            }
            try {
                const res = await fetch('/api/users/batch-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: Array.from(selectedUserIds) })
                });
                const data = await res.json();
                if (data.success) {
                    selectedUserIds.clear();
                    document.getElementById('selectAll').checked = false;
                    loadUsers();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        // 单用户删除
        async function deleteUser(userId, username) {
            if (!confirm(`确定要删除用户 "${username}" 吗？此操作无法撤销。`)) {
                return;
            }
            try {
                const res = await fetch(`/api/users/${userId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    selectedUserIds.delete(userId);
                    loadUsers();
                } else {
                    alert('删除失败: ' + data.error);
                }
            } catch (err) {
                alert('删除失败，请检查网络连接');
            }
        }

        // 重置用户密码
        async function resetUserPassword(userId, username) {
            const newPwd = prompt(`请输入用户 "${username}" 的新密码：`);
            if (!newPwd) return;
            try {
                const res = await fetch(`/api/users/${userId}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword: newPwd })
                });
                const data = await res.json();
                if (data.success) {
                    alert('密码修改成功');
                } else {
                    alert(data.error || '修改失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        // 加载用户列表
        async function loadUsers() {
            const container = document.getElementById('usersContainer');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const res = await fetch('/api/users');
                const data = await res.json();

                if (data.success && data.users.length > 0) {
                    document.getElementById('userCount').textContent = data.users.length;
                    selectedUserIds.clear();

                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:40px;"></th>
                                    <th>注册时间</th>
                                    <th>用户名</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.users.forEach(user => {
                        const date = new Date(user.created_at);
                        const formattedDate = date.toLocaleString('zh-CN');
                        html += `
                            <tr>
                                <td><input type="checkbox" class="user-checkbox" value="${user.id}" onclick="toggleUser('${user.id}', this.checked)"></td>
                                <td>${formattedDate}</td>
                                <td>${escapeHtml(user.username)}</td>
                                <td>
                                    <button class="action-btn reset-pwd-btn" onclick="resetUserPassword('${user.id}', '${escapeHtml(user.username)}')">修改密码</button>
                                    <button class="action-btn delete-btn" onclick="deleteUser('${user.id}', '${escapeHtml(user.username)}')">删除</button>
                                </td>
                            </tr>
                        `;
                    });

                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无用户</div>';
                    document.getElementById('userCount').textContent = '0';
                }
            } catch (error) {
                container.innerHTML = '<div class="empty-state">加载失败，请检查服务器</div>';
                console.error('Error loading users:', error);
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // 加载注册限额
        async function loadRegLimit() {
            try {
                const res = await fetch('/api/admin/registration-limit');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('regLimit').textContent = data.limit;
                    document.getElementById('regTodayCount').textContent = data.todayCount;
                    document.getElementById('regLimitInput').value = data.limit;
                }
            } catch (err) {
                console.error('Load reg limit error:', err);
            }
        }

        // 更新注册限额
        async function updateRegLimit() {
            const limit = parseInt(document.getElementById('regLimitInput').value, 10);
            if (isNaN(limit) || limit < 0) {
                alert('请输入有效数字（0或正整数）');
                return;
            }
            try {
                const res = await fetch('/api/admin/registration-limit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ limit })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('regLimit').textContent = data.limit;
                    alert('限额已更新');
                } else {
                    alert(data.error || '更新失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        // ====== 短链接管理 ======

        async function loadShares() {
            const container = document.getElementById('sharesContainer');
            container.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch('/api/admin/shares');
                const data = await res.json();
                if (data.success && data.shares.length > 0) {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:40px;"><input type="checkbox" id="shareSelectAll" onclick="toggleShareSelectAll()"></th>
                                    <th>创建时间</th>
                                    <th>用户</th>
                                    <th>短码</th>
                                    <th>链接</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    data.shares.forEach((s, idx) => {
                        const date = new Date(s.created_at);
                        const formattedDate = date.toLocaleString('zh-CN');
                        const fullUrl = `https://mark.lcy.app/${s.code}`;
                        html += `
                            <tr>
                                <td><input type="checkbox" class="share-checkbox" data-id="${s.id}" onchange="updateShareSelectUI()"></td>
                                <td>${formattedDate}</td>
                                <td>${escapeHtml(s.username || '已删除')}</td>
                                <td><code>${escapeHtml(s.code)}</code></td>
                                <td><a href="${fullUrl}" target="_blank" style="color:#667eea;font-size:13px;">${fullUrl}</a></td>
                                <td>
                                    <button class="action-btn reset-pwd-btn" onclick="editShareDomain('${s.id}', '${escapeHtml(s.code)}')">改短码</button>
                                    <button class="action-btn delete-btn" onclick="deleteShare('${s.id}', '${escapeHtml(s.code)}')">删除</button>
                                </td>
                            </tr>
                        `;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无短链接</div>';
                }
            } catch (err) {
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function editShareDomain(id, currentCode) {
            const newCode = prompt('mark.lcy.app/', currentCode);
            if (newCode === null || newCode.trim() === '' || newCode.trim() === currentCode) return;
            fetch(`/api/admin/shares/${id}/domain`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: newCode.trim() })
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    loadShares();
                } else {
                    alert(data.error || '更新失败');
                }
            }).catch(() => alert('网络错误'));
        }

        async function deleteShare(id, code) {
            if (!confirm(`确定要删除短链接 "${code}" 吗？`)) return;
            try {
                const res = await fetch(`/api/admin/shares/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadShares();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        // ====== 短链接多选 ======

        function toggleShareSelectAll() {
            const selectAll = document.getElementById('shareSelectAll');
            document.querySelectorAll('.share-checkbox').forEach(cb => cb.checked = selectAll.checked);
            updateShareSelectUI();
        }

        function updateShareSelectUI() {
            const checked = document.querySelectorAll('.share-checkbox:checked');
            document.getElementById('batchDeleteSharesBtn').style.display = checked.length > 0 ? 'inline-block' : 'none';
        }

        function getSelectedShareIds() {
            return Array.from(document.querySelectorAll('.share-checkbox:checked')).map(cb => parseInt(cb.dataset.id, 10));
        }

        async function batchDeleteShares() {
            const ids = getSelectedShareIds();
            if (ids.length === 0) return;
            if (!confirm(`确定要删除选中的 ${ids.length} 条短链接吗？`)) return;
            for (const id of ids) {
                await fetch(`/api/admin/shares/${id}`, { method: 'DELETE' });
            }
            loadShares();
        }

        // ====== 全局搜索引擎管理 ======

        function getEngineHostname(url) {
            try {
                return new URL(url.replace('{q}', '')).hostname;
            } catch (e) { return ''; }
        }

        function renderEngineIcon(eng, size) {
            size = size || 28;
            const hostname = getEngineHostname(eng.searchUrl || '');
            if (!hostname) return '';
            return `<img src="/api/favicon/${encodeURIComponent(hostname)}" width="${size}" height="${size}"
                style="border-radius:6px;vertical-align:middle;"
                onerror="this.outerHTML='<span style=\\'display:inline-flex;width:${size}px;height:${size}px;border-radius:6px;background:${eng.color || '#666'};color:white;align-items:center;justify-content:center;font-size:14px;font-weight:bold;\\'>${(eng.name||'?').charAt(0).toUpperCase()}</span>'"
            >`;
        }

        async function loadGlobalEngines() {
            const container = document.getElementById('enginesContainer');
            container.innerHTML = '<div class="loading" style="color:#555;">加载中...</div>';
            try {
                const res = await fetch('/api/global-engines');
                const data = await res.json();
                const engines = data.engines || [];
                if (engines.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无全局搜索引擎，点击右上角"+ 添加引擎"新增</div>';
                    return;
                }
                let html = `<table id="enginesTable"><thead><tr>
                    <th style="width:32px;"></th>
                    <th style="width:48px;">图标</th>
                    <th>名称</th>
                    <th>搜索地址</th>
                    <th style="width:60px;">颜色</th>
                    <th style="width:70px;">显示</th>
                    <th>操作</th>
                </tr></thead><tbody id="enginesTbody">`;
                engines.forEach((eng, idx) => {
                    const isBuiltin = eng.isBuiltin ? 'true' : 'false';
                    const builtinBadge = eng.isBuiltin ? '<span class="badge-builtin">内置</span>' : '';
                    const isVisible = eng.visible !== false;
                    const deleteBtn = eng.isBuiltin
                        ? '<button class="action-btn" style="background:#ccc;color:#888;cursor:not-allowed;" disabled title="内置引擎不可删除">删除</button>'
                        : `<button class="action-btn delete-btn" onclick="deleteGlobalEngine('${escapeHtml(eng.id)}', '${escapeHtml(eng.name)}')">删除</button>`;
                    const iconCell = eng.searchUrl ? renderEngineIcon(eng, 28) : '<span style="font-size:18px;">🔖</span>';
                    const toggleBtn = isVisible
                        ? `<button class="action-btn toggle-visible-btn" onclick="toggleEngineVisibility('${escapeHtml(eng.id)}', false)" title="点击隐藏">显示中</button>`
                        : `<button class="action-btn toggle-hidden-btn" onclick="toggleEngineVisibility('${escapeHtml(eng.id)}', true)" title="点击显示">已隐藏</button>`;
                    html += `<tr draggable="true" data-id="${escapeHtml(eng.id)}" data-idx="${idx}"${!isVisible ? ' style="opacity:0.5;"' : ''}>
                        <td class="drag-handle" title="拖拽排序">⠿</td>
                        <td>${iconCell}</td>
                        <td>${escapeHtml(eng.name)}${builtinBadge}</td>
                        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#888;">${escapeHtml(eng.searchUrl || '—')}</td>
                        <td><span class="engine-color-dot" style="background:${escapeHtml(eng.color||'#666')};"></span></td>
                        <td style="text-align:center;">${toggleBtn}</td>
                        <td>
                            <button class="action-btn edit-engine-btn" onclick="openEngineModal('${escapeHtml(eng.id)}', '${escapeHtml(eng.name)}', '${escapeHtml(eng.searchUrl||'')}', '${escapeHtml(eng.color||'#666')}')">编辑</button>
                            ${deleteBtn}
                        </td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
                initDragSort();
            } catch (err) {
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 拖拽排序初始化
        function initDragSort() {
            const tbody = document.getElementById('enginesTbody');
            if (!tbody) return;
            let dragSrc = null;

            tbody.querySelectorAll('tr').forEach(function(row) {
                row.addEventListener('dragstart', function(e) {
                    dragSrc = this;
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                row.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    tbody.querySelectorAll('tr').forEach(function(r) { r.classList.remove('drag-over'); });
                });
                row.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (this !== dragSrc) {
                        tbody.querySelectorAll('tr').forEach(function(r) { r.classList.remove('drag-over'); });
                        this.classList.add('drag-over');
                    }
                });
                row.addEventListener('drop', function(e) {
                    e.preventDefault();
                    if (this === dragSrc) return;
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    const srcIdx = rows.indexOf(dragSrc);
                    const dstIdx = rows.indexOf(this);
                    if (srcIdx < dstIdx) {
                        tbody.insertBefore(dragSrc, this.nextSibling);
                    } else {
                        tbody.insertBefore(dragSrc, this);
                    }
                    this.classList.remove('drag-over');
                    saveEngineOrder();
                });
            });
        }

        // 保存新的引擎顺序
        async function saveEngineOrder() {
            const tbody = document.getElementById('enginesTbody');
            if (!tbody || !adminPwd) return;
            // 从当前 DOM 顺序收集引擎 id
            const ids = Array.from(tbody.querySelectorAll('tr')).map(function(r) { return r.dataset.id; });
            // 拉取最新引擎数据，按新 id 顺序排列
            try {
                const res = await fetch('/api/global-engines');
                const data = await res.json();
                const engines = data.engines || [];
                const engineMap = {};
                engines.forEach(function(e) { engineMap[e.id] = e; });
                const reordered = ids.map(function(id) { return engineMap[id]; }).filter(Boolean);
                await fetch('/api/admin/global-engines/reorder', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPwd, engines: reordered })
                });
                // 成功后不刷新DOM，避免打断连续拖拽
            } catch (err) {
                console.error('保存顺序失败', err);
            }
        }

        function openEngineModal(id, name, url, color) {
            document.getElementById('engineModalTitle').textContent = id ? '编辑搜索引擎' : '添加搜索引擎';
            document.getElementById('engineEditId').value = id || '';
            document.getElementById('engineName').value = name || '';
            document.getElementById('engineUrl').value = url || '';
            document.getElementById('engineColor').value = color || '#667eea';
            updateEnginePreview();
            document.getElementById('engineModal').style.display = 'flex';
        }

        function closeEngineModal() {
            document.getElementById('engineModal').style.display = 'none';
        }

        function updateEnginePreview() {
            const url = document.getElementById('engineUrl').value;
            const name = document.getElementById('engineName').value;
            const color = document.getElementById('engineColor').value;
            const preview = document.getElementById('engineIconPreview');
            const fallback = document.getElementById('engineIconFallback');
            const hostname = getEngineHostname(url);
            if (hostname) {
                preview.src = '/api/favicon/' + encodeURIComponent(hostname);
                preview.style.display = 'inline-block';
                fallback.style.display = 'none';
                preview.onerror = function() {
                    preview.style.display = 'none';
                    fallback.style.display = 'flex';
                    fallback.textContent = (name || '?').charAt(0).toUpperCase();
                    fallback.style.background = color;
                };
            } else {
                preview.style.display = 'none';
                fallback.style.display = name ? 'flex' : 'none';
                fallback.textContent = (name || '?').charAt(0).toUpperCase();
                fallback.style.background = color;
            }
        }

        document.getElementById('engineUrl').addEventListener('input', updateEnginePreview);
        document.getElementById('engineName').addEventListener('input', updateEnginePreview);
        document.getElementById('engineColor').addEventListener('input', updateEnginePreview);
        document.getElementById('engineModal').addEventListener('click', function(e) {
            if (e.target === this) closeEngineModal();
        });

        async function saveEngine() {
            const id = document.getElementById('engineEditId').value;
            const name = document.getElementById('engineName').value.trim();
            const searchUrl = document.getElementById('engineUrl').value.trim();
            const color = document.getElementById('engineColor').value;
            if (!name || !searchUrl) { alert('请填写名称和搜索地址'); return; }
            if (!searchUrl.includes('{q}')) { alert('搜索地址必须包含 {q}'); return; }
            if (!adminPwd) { alert('请重新登录管理后台'); return; }

            try {
                let res;
                if (id) {
                    res = await fetch(`/api/admin/global-engines/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: adminPwd, name, searchUrl, color })
                    });
                } else {
                    res = await fetch('/api/admin/global-engines', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: adminPwd, name, searchUrl, color })
                    });
                }
                const data = await res.json();
                if (data.success) {
                    closeEngineModal();
                    loadGlobalEngines();
                } else {
                    alert(data.error || '保存失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        async function deleteGlobalEngine(id, name) {
            if (!confirm(`确定要删除搜索引擎 "${name}" 吗？\n此操作将对所有用户生效。`)) return;
            if (!adminPwd) { alert('请重新登录管理后台'); return; }
            try {
                const res = await fetch(`/api/admin/global-engines/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPwd })
                });
                const data = await res.json();
                if (data.success) {
                    loadGlobalEngines();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        async function toggleEngineVisibility(id, visible) {
            if (!adminPwd) { alert('请重新登录管理后台'); return; }
            try {
                const res = await fetch(`/api/admin/global-engines/${id}/visibility`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPwd, visible: visible })
                });
                const data = await res.json();
                if (data.success) {
                    loadGlobalEngines();
                } else {
                    alert(data.error || '操作失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }
    </script>
</body>
