<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员面板 - Mark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.8;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: white;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            opacity: 0.8;
            margin-top: 5px;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .table-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 {
            font-size: 1.2rem;
            margin: 0;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #e8e8e8;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        @media (max-width: 600px) {
            .table-container {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 管理员面板</h1>
            <p>Mark 书签管理应用 - 用户数据管理</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="userCount">0</div>
                <div class="label">用户总数</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>用户列表</h2>
                <button class="refresh-btn" onclick="loadUsers()">🔄 刷新</button>
            </div>
            <div id="usersContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadUsers() {
            const container = document.getElementById('usersContainer');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch('/api/users');
                const data = await response.json();

                if (data.success && data.users.length > 0) {
                    document.getElementById('userCount').textContent = data.users.length;
                    
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    data.users.forEach(user => {
                        const date = new Date(user.createdAt);
                        const formattedDate = date.toLocaleString('zh-CN');
                        
                        html += `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.username}</td>
                                <td>${formattedDate}</td>
                                <td>
                                    <button class="action-btn delete-btn" onclick="deleteUser('${user.id}', '${user.username}')">删除</button>
                                </td>
                            </tr>
                        `;
                    });

                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="empty-state">暂无用户</div>';
                    document.getElementById('userCount').textContent = '0';
                }
            } catch (error) {
                container.innerHTML = '<div class="empty-state">加载失败，请检查服务器</div>';
                console.error('Error loading users:', error);
            }
        }

        async function deleteUser(userId, username) {
            if (!confirm(`确定要删除用户 "${username}" 吗？此操作无法撤销。`)) {
                return;
            }

            try {
                const response = await fetch(`/api/users/${userId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    loadUsers();
                } else {
                    alert('删除失败: ' + data.error);
                }
            } catch (error) {
                alert('删除失败，请检查网络连接');
            }
        }

        loadUsers();
    </script>
</body>
</html>
