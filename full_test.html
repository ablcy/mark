<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签解析完整测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #667eea;
            text-align: center;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        button:hover {
            background: #764ba2;
        }
        #output {
            margin-top: 30px;
        }
        .folder {
            margin: 10px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .folder-header {
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
        }
        .bookmark {
            margin: 5px 0 5px 30px;
            padding: 8px;
        }
        .bookmark a {
            color: #667eea;
            text-decoration: none;
        }
        .bookmark a:hover {
            text-decoration: underline;
        }
        .folder-content {
            margin-left: 20px;
            margin-top: 10px;
        }
        .success {
            color: green;
            font-weight: bold;
            padding: 10px;
            background: #d4edda;
            border-radius: 8px;
            margin: 10px 0;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 完整书签解析测试</h1>
        <button onclick="runTest()">运行完整测试</button>
        <div id="output"></div>
    </div>

    <script>
        async function runTest() {
            const output = document.getElementById('output');
            output.innerHTML = '<p>正在加载书签文件...</p>';
            
            try {
                // 加载书签文件
                const response = await fetch('test_bookmarks.html');
                const html = await response.text();
                output.innerHTML = '<p>文件加载成功！正在解析...</p>';
                
                // 解析书签
                const bookmarks = parseBookmarksHTML(html);
                output.innerHTML = `
                    <div class="success">✅ 解析成功！找到 ${bookmarks.length} 个顶级文件夹！</div>
                `;
                
                // 渲染书签
                renderBookmarks(bookmarks, output);
                
                // 输出一些调试信息
                console.log('解析结果:', bookmarks);
                
            } catch (error) {
                output.innerHTML = `<div class="error">❌ 错误：${error.message}</div>`;
                console.error(error);
            }
        }

        function parseBookmarksHTML(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const root = [];
            
            // 递归处理节点
            function processNode(node) {
                const result = [];
                let currentNode = node.firstChild;
                
                while (currentNode) {
                    if (currentNode.nodeType === Node.ELEMENT_NODE) {
                        if (currentNode.tagName === 'DT') {
                            const h3 = currentNode.querySelector('h3');
                            const a = currentNode.querySelector('a');
                            
                            if (h3) {
                                // 这是一个文件夹
                                const folder = {
                                    type: 'folder',
                                    name: h3.textContent.trim(),
                                    dateAdded: h3.getAttribute('add_date'),
                                    children: []
                                };
                                
                                // 找到下一个 DL 作为这个文件夹的内容
                                let nextNode = currentNode.nextElementSibling;
                                while (nextNode) {
                                    if (nextNode.tagName === 'DL') {
                                        folder.children = processNode(nextNode);
                                        break;
                                    }
                                    nextNode = nextNode.nextElementSibling;
                                }
                                
                                result.push(folder);
                            } else if (a) {
                                // 这是一个书签
                                result.push({
                                    type: 'bookmark',
                                    title: a.textContent.trim() || a.getAttribute('href'),
                                    url: a.getAttribute('href'),
                                    dateAdded: a.getAttribute('add_date')
                                });
                            }
                        } else if (currentNode.tagName === 'DL') {
                            // 处理 DL 标签内的内容
                            const dlContent = processNode(currentNode);
                            result.push(...dlContent);
                        }
                    }
                    currentNode = currentNode.nextSibling;
                }
                return result;
            }
            
            const firstDL = doc.querySelector('dl');
            if (firstDL) {
                const parsed = processNode(firstDL);
                return parsed;
            }
            
            return root;
        }

        function renderBookmarks(items, container) {
            const div = document.createElement('div');
            
            for (const item of items) {
                if (item.type === 'folder') {
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'folder';
                    
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'folder-header';
                    headerDiv.textContent = `📁 ${item.name} (${item.children.length} 项)`;
                    folderDiv.appendChild(headerDiv);
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'folder-content';
                    // 默认展开
                    contentDiv.style.display = 'block';
                    renderBookmarks(item.children, contentDiv);
                    folderDiv.appendChild(contentDiv);
                    
                    div.appendChild(folderDiv);
                } else if (item.type === 'bookmark') {
                    const bookmarkDiv = document.createElement('div');
                    bookmarkDiv.className = 'bookmark';
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.target = '_blank';
                    link.textContent = `🔗 ${item.title}`;
                    bookmarkDiv.appendChild(link);
                    div.appendChild(bookmarkDiv);
                }
            }
            
            container.appendChild(div);
        }
    </script>
</body>
</html>
